name: Fetch Events

on:
  # Run every 5 minutes (GitHub Actions minimum is 5 min)
  schedule:
    - cron: '*/5 * * * *'
  # Also allow manual trigger and run on push to main
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/listings.json'
      - 'scripts/fetch-events.js'
      - '.github/workflows/fetch-events.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch all event listings
        env:
          ACTION_NETWORK_API_KEY: ${{ secrets.ACTION_NETWORK_API_KEY }}
        run: node scripts/fetch-events.js --all

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update event data [skip ci]"
            git push
          fi
